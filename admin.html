<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面｜Chabon Ops</title>
<style>
  :root{

    --main-dark: #335c3e;
    --main-light: #e9f1ea;
    --accent: #c9533f;
    --bg: #faf8f3;
    --card: #ffffff;

    color: var(--ink);

  .loading{ color: #999; font-size: 0.9rem; }

    border-radius: 100px;
    background: var(--main);
    color: #fff;
    font-weight: bold;
    font-size: 0.85rem;

    cursor: pointer;
  }
  .confirm-week-btn:active{ background: var(--main-dark); }
  .production-link{
    font-size: 0.78rem;
    color: var(--main-dark);

    margin-left: 10px;

  .refresh-shift-btn{
    margin-left: auto;
    border: 1px solid var(--main);
    background: var(--main-light);
    color: var(--main-dark);
    font-weight: bold;
    font-size: 0.78rem;
    padding: 6px 14px;
    border-radius: 100px;
    cursor: pointer;
    white-space: nowrap;
  }
  .refresh-shift-btn:active{ background: var(--main); color: #fff; }
  .refresh-shift-btn:disabled{
    opacity: 0.7;
    cursor: default;
  }
  .refresh-shift-btn.success{
    background: var(--main);

    border-color: var(--main);
  }
  .week-status-msg{
    font-size: 0.78rem;
    color: var(--main-dark);
    margin-left: 6px;
  }

  .day-cards{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 12px;

  .day-card{
    position: relative;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px;
    background: #fdfcf9;
  }
  .week-pin-label{
    position: absolute;

    left: 10px;

    color: #fff;
    font-size: 0.66rem;
    font-weight: bold;
    padding: 2px 10px;
    border-radius: 100px;

  .week-next-next .week-pin-label{ background: #4f7a8c; }
  .week-divider{

  }
  .week-next-next .day-card{
    background: #eef3f5;

  }
  .week-next-next .day-card .day-head{ color: #3c6577; }
  .week-next-next .week-heading h3{ color: #3c6577; }

  .week-this-week .week-pin-label{ background: #c9853f; }

  .day-card-head{

  .day-store-content{

  .day-store-num{

    width: 100%;

    text-align: center;

  .line-qty-input{

  .line-qty-step-btn{

    height: 34px;
    line-height: 1;
    border: 1px solid var(--line);

    color: var(--main-dark);
    font-size: 1.1rem;
    font-weight: bold;

  .line-unit{ font-size: 0.78rem; color: #888; }
  .line-delete-btn{
    border: none;
    background: none;

    font-size: 0.78rem;

    padding: 2px 4px;

  .add-line-btn{
    border: 1px dashed var(--line);
    background: #fff;
    color: var(--main-dark);
    font-size: 0.76rem;
    padding: 5px 10px;
    border-radius: 100px;

    margin-top: 2px;
  }
  .wish-readonly{ font-size: 0.78rem; color: #888; margin-bottom: 4px; }
  .total-override-input{
    width: 56px;
    padding: 4px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 0.84rem;
    text-align: center;

  .member-mismatch{

  .ok-line{

  .prod-summary{
    font-size: 0.82rem;

    background: var(--main-light);
    border-radius: 8px;

  }

  .warning-line{

  /* シフト一覧テーブル */
  #shiftTableArea{ overflow-x: auto; }
  #shiftTableArea table{ width: 100%; border-collapse: collapse; font-size: 0.82rem; min-width: 760px; }

  /* 具材割り振り（カード内に統合） */
  .pill{
    display:inline-block;

    margin: 2px 3px 2px 0;
  }

  footer{
    text-align:center;
    font-size: 0.78rem;
    color: #999;
    padding: 20px 0 40px;
  }

<script>
const LAT = 52.3676, LON = 4.9041;
const SPREADSHEET_ID = "1rQtRUSP5e7qOjnT4RPvMGfWrEFcFL89AsLe8cjGIW4U"; // チセさんの生産データ
const SHIFT_SPREADSHEET_ID = "1PHf1o3smqIQdeFkhBHjBZUEub7VtRcynQLllmSR7w-s"; // シフト回答／確定プラン
// TODO: シフト回答用スプレッドシートに紐づけたApps Script（Code.gs）のウェブアプリ公開URLに置き換えてください
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyxbKMgM4ZiowaJu3cQ4NdLhwSE9-Pet8DbYB3qvgEX2NS2h1Dosgfm62vu7-in52ZT/exec";

const DAY_NAMES = ["日","月","火","水","木","金","土"];
const MEMBERS = ["YUMI", "MARI", "CHIKAKO", "YUKARI", "MIKI"];
const FILLINGS = ["ツナマヨ","スパイシーツナマヨ","テリヤキチキン","サーモン","スパイシー味噌","枝豆","梅"];
const FILLING_RATIOS = {
  "スパイシーツナマヨ": 0.25,
  "テリヤキチキン": 0.22,
  "サーモン": 0.22,
  "ツナマヨ": 0.15,
  "スパイシー味噌": 0.10,
  "枝豆": 0.04,
  "梅": 0.02,
};
const ZUID_SEASON_BASE = {
  winter: { 1: 90, 2: 110, 3: 100, 4: 110, 5: 90 },  // 12〜2月（金は月と同値）
  spring: { 1: 100, 2: 125, 3: 115, 4: 125, 5: 100 }, // 3〜5月（金は月と同値）
  summer: { 1: 95, 2: 115, 3: 105, 4: 110, 5: 95 },  // 6〜8月（初夏）（金は月と同値）
  autumn: { 1: 95, 2: 120, 3: 110, 4: 120, 5: 95 },  // 9〜11月（金は月と同値）
};
const SEASON_LABELS = { winter: "冬", spring: "春", summer: "初夏", autumn: "秋" };

function getSeason(month){
  if(month === 12 || month <= 2) return "winter";
  if(month <= 5) return "spring";
  if(month <= 8) return "summer";
  return "autumn";
}

function tempAdjustment(temp){
  if(temp <= 15) return { adj: -15, label: "15℃以下" };
  if(temp <= 17) return { adj: -5, label: "16〜17℃" };
  if(temp <= 24) return { adj: 10, label: "18〜24℃" };
  if(temp <= 28) return { adj: 0, label: "25〜28℃" };
  return { adj: -10, label: "29℃以上" };
}

function isRainCode(code){
  return [51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(code);
}

function weatherCategory(code){
  if(code === 0 || code === 1) return "晴れ";
  if(isRainCode(code)) return "雨";
  return "曇り";
}

const state = {
  days: [],          // 来週+再来週 月〜木の8日分
  chiseByDate: {},   // dateKey -> { breakdown:{product:qty}, subtotal }
  shiftByDate: {},   // dateKey -> { memberName: { qty:number, raw:string } }
};

/* ---------- 日付ユーティリティ ---------- */

function getMonday(date){
  const d = new Date(date);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0, 0, 0, 0);
  return d;
}

function getWeekDates(weekOffset){
  const thisMonday = getMonday(new Date());
  const targetMonday = new Date(thisMonday);
  targetMonday.setDate(thisMonday.getDate() + weekOffset * 7);
  const dates = [];
  for(let i = 0; i < 5; i++){
    const d = new Date(targetMonday);
    d.setDate(targetMonday.getDate() + i);
    dates.push(d);
  }
  return dates;
}

// 「今週」：今日〜今週金曜まで。今日が月〜金の場合のみ表示し、土・日は表示しない
function getThisWeekRemainingDates(){
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const dow = today.getDay();
  if(dow < 1 || dow > 5) return [];

  const thisMonday = getMonday(today);
  const thisFriday = new Date(thisMonday);
  thisFriday.setDate(thisMonday.getDate() + 4);

  const dates = [];
  const cursor = new Date(today);
  while(cursor <= thisFriday){
    dates.push(new Date(cursor));
    cursor.setDate(cursor.getDate() + 1);
  }
  return dates;
}

function formatDateLabel(d){
  return `${d.getMonth() + 1}/${d.getDate()} ${DAY_NAMES[d.getDay()]}曜日`;
}

function dateKey(d){
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
}

function isoDate(d){
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${d.getFullYear()}-${mm}-${dd}`;
}

/* ---------- 天気 ---------- */

function weatherInfo(code){
  if(code === 0) return { icon:"☀️", text:"快晴" };
  if(code === 1 || code === 2) return { icon:"🌤️", text:"晴れ" };
  if(code === 3) return { icon:"☁️", text:"曇り" };
  if(code === 45 || code === 48) return { icon:"🌫️", text:"霧" };
  if([51,53,55,56,57].includes(code)) return { icon:"🌦️", text:"霧雨" };
  if([61,63,65,66,67].includes(code)) return { icon:"🌧️", text:"雨" };
  if([71,73,75,77].includes(code)) return { icon:"❄️", text:"雪" };
  if([80,81,82].includes(code)) return { icon:"🌧️", text:"にわか雨" };
  if([85,86].includes(code)) return { icon:"🌨️", text:"にわか雪" };
  if([95,96,99].includes(code)) return { icon:"⛈️", text:"雷雨" };
  return { icon:"❔", text:"不明" };
}

function buildHourlyByDate(hourly){
  const map = {};
  hourly.time.forEach((ts, i) => {
    const [datePart, timePart] = ts.split("T");
    const hour = parseInt(timePart.slice(0, 2), 10);
    if(!map[datePart]) map[datePart] = {};
    map[datePart][hour] = {
      temp: hourly.temperature_2m[i],
      precip: hourly.precipitation[i],
      code: hourly.weathercode[i],
    };
  });
  return map;
}

// 11〜15時（4スロット）の平均気温・降水量
function computeSalesWeather(hourlyByDate, isoDateStr){
  const day = hourlyByDate[isoDateStr];
  if(!day) return null;
  const coreHours = [11, 12, 13, 14];
  const present = coreHours.filter(h => day[h]);
  if(present.length === 0) return null;
  const avgTemp = present.reduce((s, h) => s + day[h].temp, 0) / present.length;
  const precipCore = present.reduce((s, h) => s + (day[h].precip || 0), 0);
  const peakHours = [12, 13];
  const precipPeak = peakHours.filter(h => day[h]).reduce((s, h) => s + (day[h].precip || 0), 0);
  const repCode = present.length ? day[present[0]].code : null;
  return { avgTemp, hasRainGeneral: precipCore >= 1, hasRainPeak: precipPeak >= 1, code: repCode };
}

/* ---------- 推奨数算出（予報範囲外にも対応） ---------- */

function calcZuid(dow, month, salesWeather){
  const season = getSeason(month);
  const base = ZUID_SEASON_BASE[season][dow];
  if(base === undefined) return null;

  let total = base;
  const reasons = [`${SEASON_LABELS[season]}・${DAY_NAMES[dow]}曜ベース ${total}個`];

  if(!salesWeather){
    reasons.push("予報範囲外のため気温・天気補正なし");
    const ZUID_MIN_NF = 100;
    if(total < ZUID_MIN_NF){ total = ZUID_MIN_NF; reasons.push(`最低保証 ${ZUID_MIN_NF}個 を適用`); }
    return { total, reasons };
  }

  const { adj: tempAdj, label: tempLabel } = tempAdjustment(salesWeather.avgTemp);
  total += tempAdj;
  reasons.push(`気温${tempLabel}(11-15時平均) ${tempAdj >= 0 ? "+" : ""}${tempAdj}`);

  if(salesWeather.hasRainGeneral){
    total -= 20;
    reasons.push("販売時間帯(11〜15時)に雨 -20");
  } else if(weatherCategory(salesWeather.code) === "晴れ"){
    total += 5;
    reasons.push("晴れ +5");
  } else if(weatherCategory(salesWeather.code) === "雨"){
    reasons.push("販売時間帯外の雨のみ 天気補正なし");
  } else {
    reasons.push("曇り ±0");
  }

  const ZUID_MIN = 100;
  if(total < ZUID_MIN){
    total = ZUID_MIN;
    reasons.push(`最低保証 ${ZUID_MIN}個 を適用`);
  }

  return { total, reasons };
}

function calcUvA(dow, salesWeather){
  if(![1, 2, 4].includes(dow)) return null;
  let total = 35;
  const reasons = ["基本 35個"];

  if(salesWeather && salesWeather.avgTemp >= 18 && salesWeather.avgTemp <= 24){
    total += 5;
    reasons.push("気温18〜24℃ +5");
  }

  if(salesWeather && salesWeather.hasRainGeneral){ total -= 10; reasons.push("販売時間帯(11〜14時)に雨 -10"); }

  const UVA_MIN = 25;
  if(total < UVA_MIN){
    total = UVA_MIN;
    reasons.push(`最低保証 ${UVA_MIN}個 を適用`);
  }

  return { total, reasons };
}

const ZUID_MIN_GUARANTEE = 100;
const UVA_MIN_GUARANTEE = 25;
const HOLIDAY_PENALTY = 30;

// 無料・APIキー不要のオランダ祝日API。CORS対応済みでブラウザから直接fetch可能
async function fetchDutchHolidays(years){
  const lists = await Promise.all(years.map(async year => {
    try{
      const res = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/NL`);
      if(!res.ok) return [];
      return await res.json();
    }catch(e){
      console.error(`祝日データの取得に失敗しました（${year}年）`, e);
      return [];
    }
  }));
  const map = {};
  lists.flat().forEach(h => { map[h.date] = h.localName || h.name; });
  return map;
}

// 祝日補正：販売推奨数を-30個し、最低保証は維持したまま理由テキストに追記する
function applyHolidayPenalty(result, minGuarantee){
  if(!result) return;
  result.total = Math.max(minGuarantee, result.total - HOLIDAY_PENALTY);
  result.reasons.push(`祝日 -${HOLIDAY_PENALTY}`);
}

/* ---------- スプレッドシート読み込み（gviz） ---------- */

async function fetchSheetJson(sheetName, spreadsheetId){
  const id = spreadsheetId || SPREADSHEET_ID;
  const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json` +
    (sheetName ? `&sheet=${encodeURIComponent(sheetName)}` : "");
  const res = await fetch(url);
  const text = await res.text();
  const match = text.match(/setResponse\(([\s\S]*)\);\s*$/);
  if(!match) throw new Error("シートの解析に失敗しました: " + sheetName);
  return JSON.parse(match[1]);
}

// シート上の日付セルは「数値（シリアル値）」と「Date型」が混在しているため、
// 型に関係なく常に存在する表示用フォーマット文字列（例："6/23"）を使って判定・マッチングする。
function mdLabel(d){
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

// チセさんの生産表（商品×日付の横持ち表）を解析。キーは "6/23" 形式の文字列。
function parseChiseSheet(json){
  const rawRows = json.table.rows || [];
  if(rawRows.length === 0) return {};

  const dateRowCells = rawRows[0].c;
  const dateCols = [];
  dateRowCells.forEach((cell, idx) => {
    const f = cell && cell.f;
    if(f && /^\d{1,2}\/\d{1,2}$/.test(f)){
      dateCols.push({ idx, label: f });
    }
  });

  const rows = rawRows.map(r => r.c.map(c => (c ? c.v : null)));
  let startRow = -1, endRow = -1;
  rows.forEach((r, i) => {
    if(r[0] === "商品") startRow = i + 1;
    if(r[0] === "SUB TOTAL" && startRow !== -1 && endRow === -1) endRow = i;
  });
  if(startRow === -1 || endRow === -1) return {};

  const byLabel = {};
  dateCols.forEach(({ idx, label }) => {
    const breakdown = {};
    for(let i = startRow; i < endRow; i++){
      const name = rows[i][0];
      const qty = rows[i][idx];
      if(name && typeof qty === "number") breakdown[name] = qty;
    }
    const subtotalCell = rows[endRow][idx];
    const subtotal = typeof subtotalCell === "number"
      ? subtotalCell
      : Object.values(breakdown).reduce((s, v) => s + v, 0);
    byLabel[label] = { breakdown, subtotal };
  });

  return byLabel;
}

function parseQtyNumber(qtyStr){
  if(!qtyStr) return 0;
  if(qtyStr === "希望しない") return 0;
  const m = String(qtyStr).match(/(\d+)/);
  return m ? parseInt(m[1], 10) : 0;
}

// シフト回答シート（送信日時, 名前, 日付, 曜日, 個数, 備考）を解析。キーは "6/23" 形式
function parseShiftSheet(json){
  const rawRows = json.table.rows || [];
  const byDate = {};
  rawRows.forEach(row => {
    const c = row.c;
    if(!c) return;
    const name = c[1] && c[1].v;
    const dateCell = c[2];
    // 「日付」列はシート側で日付型に自動変換されているため、表示用文字列(f)を "6/23" 形式のキーとして使う
    const key = dateCell && (dateCell.f || dateCell.v);
    const qtyRaw = c[4] && c[4].v;
    if(!name || !key) return;
    if(!byDate[key]) byDate[key] = {};
    byDate[key][name] = { qty: parseQtyNumber(qtyRaw), raw: qtyRaw || "" };
  });
  return byDate;
}

/* ---------- データ構築 ---------- */

function buildDays(daily, hourlyByDate){
  const week0 = getThisWeekRemainingDates();
  const week1 = getWeekDates(1);
  const week2 = getWeekDates(2);
  const all = [
    ...week0.map(d => ({ d, weekIndex: 0 })),
    ...week1.map(d => ({ d, weekIndex: 1 })),
    ...week2.map(d => ({ d, weekIndex: 2 })),
  ];

  return all.map(({ d, weekIndex }) => {
    const dow = d.getDay();
    const iso = isoDate(d);
    const dIdx = daily.time.indexOf(iso);
    const salesWeather = computeSalesWeather(hourlyByDate, iso);
    const hasForecast = dIdx !== -1;

    const holidayName = (state.holidaysByIso && state.holidaysByIso[iso]) || null;
    const nsDisruptions = (state.nsDisruptionsByDate && state.nsDisruptionsByDate[iso]) || null;
    const zuid = calcZuid(dow, d.getMonth() + 1, salesWeather);
    const uva = calcUvA(dow, salesWeather);
    if(holidayName){
      applyHolidayPenalty(zuid, ZUID_MIN_GUARANTEE);
      applyHolidayPenalty(uva, UVA_MIN_GUARANTEE);
    }
    if(nsDisruptions && nsDisruptions.length){
      applyNsPenalty(zuid, ZUID_MIN_GUARANTEE);
      applyNsPenalty(uva, UVA_MIN_GUARANTEE);
    }

    return {
      dateObj: d,
      dateKey: dateKey(d),
      iso,
      dow,
      weekIndex,
      label: formatDateLabel(d),
      hasForecast,
      weatherIcon: hasForecast ? weatherInfo(salesWeather ? salesWeather.code : daily.weathercode[dIdx]).icon : "❔",
      tempLabel: salesWeather ? `${Math.round(salesWeather.avgTemp)}°(11-15時平均)` : "—",
      holidayName,
      nsDisruptions,
      zuid,
      uva,
    };
  }).map(day => {
    day.zuidOpen = day.zuid !== null;
    day.zuidFillingQty = day.zuid ? buildFillingDefaults(day.zuid.total) : buildFillingDefaults(0);
    day.uvaOpen = day.uva !== null;
    day.uvaFillingQty = day.uva ? buildFillingDefaults(day.uva.total) : buildFillingDefaults(0);
    return day;
  });
}

function buildFillingDefaults(total){
  const obj = {};
  FILLINGS.forEach(f => { obj[f] = Math.round(total * FILLING_RATIOS[f]); });
  return obj;
}

// 枝豆・梅は常に本部製造（ニギニギ隊には割り振らない）
const ALWAYS_HQ_FILLINGS = ["枝豆", "梅"];
const ALLOC_FILLINGS = FILLINGS.filter(f => !ALWAYS_HQ_FILLINGS.includes(f));

// 販売予測数カードで入力された具材ごとの必要数（Zuid＋UvA）
function neededQtyFor(day, filling){
  const chise = state.chiseByDate[mdLabel(day.dateObj)];
  const chiseAmount = (chise && chise.breakdown[filling]) || 0;
  return (day.zuidFillingQty[filling] || 0) + (day.uvaFillingQty[filling] || 0) + chiseAmount;
}

// 必要数を超えないよう3の倍数に切り捨てる。端数は呼び出し側で本部に加算する
function floorToMultipleOf3(qty){
  return Math.floor(qty / 3) * 3;
}

function pillsHtml(breakdown){
  return Object.entries(breakdown).map(([f, q]) => `<span class="pill">${f}×${q}</span>`).join("");
}

// メンバーの具材割り振り（具材名・個数）を松木さんが手動編集できるようにするための編集状態を確保する
function ensureEditableLines(day, working, memberBreakdowns){
  if(!day.editableLines) day.editableLines = {};
  working.forEach((name, i) => {
    if(!day.editableLines[name]){
      const entries = Object.entries(memberBreakdowns[i] || {}).map(([filling, qty]) => ({ filling, qty }));
      day.editableLines[name] = entries.length ? entries : [{ filling: ALLOC_FILLINGS[0], qty: 0 }];
    }
  });
}

function sumQtyMap(map){
  return map ? Object.values(map).reduce((s, v) => s + v, 0) : null;
}

function zuidFinal(day){ return sumQtyMap(day.zuidFillingQty); }
function uvaFinal(day){ return sumQtyMap(day.uvaFillingQty); }

function getManualQty(day, name){
  const key = mdLabel(day.dateObj);
  const fromShift = state.shiftByDate[key] && state.shiftByDate[key][name];
  return fromShift ? fromShift.qty : 0;
}

// 日付カードのヘッダーに収まるよう、理由テキストを短縮する（汎用パターンで季節・温度帯を問わず対応）
function compactReason(str){
  let m;
  if((m = str.match(/^.+・(.)曜ベース (\d+)個$/))) return `${m[1]}曜 ${m[2]}`;
  if((m = str.match(/^気温.*?([+\-±]\d+)$/))) return `気温 ${m[1]}`;
  if((m = str.match(/^晴れ\s*([+\-±]\d+)$/))) return `晴 ${m[1]}`;
  if((m = str.match(/^曇り\s*([+\-±]\d+)$/))) return `曇 ${m[1]}`;
  if((m = str.match(/^販売時間帯.*に雨 (-?\d+)$/))) return `雨 ${m[1]}`;
  if(str.includes("天気補正なし")) return "補正なし";
  if((m = str.match(/^最低保証 (\d+)個/))) return `保証 ${m[1]}`;
  if((m = str.match(/^基本 (\d+)個$/))) return `基本 ${m[1]}`;
  return str;
}

function alignDayStoreBoxes(day){
  const tableWrap = document.getElementById(`forecastTable-${day.dateKey}`);
  const card = tableWrap && tableWrap.closest(".day-card");
  const table = tableWrap && tableWrap.querySelector("table.forecast-table");
  if(!card || !table) return;

  const ths = table.querySelectorAll("thead th");
  const units = card.querySelectorAll(".day-store-unit");
  if(ths.length < 3 || units.length < 2) return;

  const targets = [ths[1], ths[2]]; // Zuid列, UvA列
  units.forEach((unit, i) => {
    const th = targets[i];
    if(!unit || !th) return;
    unit.style.transform = ""; // 前回分のずらしをリセットしてから測る
    const thRect = th.getBoundingClientRect();
    const unitRect = unit.getBoundingClientRect();
    const offset = (thRect.left + thRect.width / 2) - (unitRect.left + unitRect.width / 2);
    unit.style.transform = `translateX(${offset}px)`;
  });
}

function bindForecastTableEvents(day){
  const container = document.getElementById(`forecastTable-${day.dateKey}`);
  if(!container) return;

  container.querySelectorAll(".qty-step-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      if(btn.disabled) return;
      const wrapper = btn.closest(".qty-stepper");
      const input = wrapper && wrapper.querySelector(".cell-input");
      if(!input || input.disabled) return;
      const delta = btn.dataset.action === "inc" ? 1 : -1;
      input.value = Math.max(0, (parseInt(input.value, 10) || 0) + delta);
      input.dispatchEvent(new Event("input", { bubbles: true }));
    });
  });

  container.querySelectorAll(".cell-input").forEach(input => {
    input.addEventListener("input", () => {
      const store = input.dataset.store;
      const filling = input.dataset.filling;
      const qtyMap = store === "zuid" ? day.zuidFillingQty : day.uvaFillingQty;
      qtyMap[filling] = Math.max(0, parseInt(input.value, 10) || 0);

      // 入力欄自体は再生成せず、行・列・全体の合計セルだけを更新する（フォーカスを失わない）
      const chise = state.chiseByDate[mdLabel(day.dateObj)];
      const chiseQtyForFilling = (chise && chise.breakdown[filling]) || 0;
      const showUva = [1, 2, 4].includes(day.dow);
      const zuidQty = day.zuidFillingQty[filling] || 0;
      const uvaQty = showUva ? (day.uvaFillingQty[filling] || 0) : 0;

      const rowTotalEl = document.getElementById(`rowTotal-${day.dateKey}-${filling}`);
      if(rowTotalEl) rowTotalEl.textContent = zuidQty + uvaQty + chiseQtyForFilling;

      const storeTotalEl = document.getElementById(`storeTotal-${store}-${day.dateKey}`);
      if(storeTotalEl) storeTotalEl.textContent = sumQtyMap(qtyMap);

      const chiseQty = chise ? chise.subtotal : 0;
      const grandTotalEl = document.getElementById(`forecastGrandTotal-${day.dateKey}`);
      if(grandTotalEl){
        grandTotalEl.textContent = sumQtyMap(day.zuidFillingQty) + (showUva ? sumQtyMap(day.uvaFillingQty) : 0) + chiseQty;
      }

      // 必要数（Zuid+UvA合計）が変わったので、本部内訳・合計チェックだけ再計算（メンバーの入力欄には触れない）
      refreshDerived(day);
    });
  });

  container.querySelectorAll(".store-toggle-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const store = btn.dataset.store;
      const isZuid = store === "zuid";
      const nowOpen = !(isZuid ? day.zuidOpen : day.uvaOpen);

      if(isZuid){
        day.zuidOpen = nowOpen;
        day.zuidFillingQty = nowOpen
          ? (day.zuid ? buildFillingDefaults(day.zuid.total) : buildFillingDefaults(0))
          : buildFillingDefaults(0);
      } else {
        day.uvaOpen = nowOpen;
        day.uvaFillingQty = nowOpen
          ? (day.uva ? buildFillingDefaults(day.uva.total) : buildFillingDefaults(0))
          : buildFillingDefaults(0);
      }

      // 営業/休みの切り替えは具材の必要数が丸ごと変わる構造的な変更なので表は再生成する
      renderForecastTable(day);
      refreshDerived(day);
    });
  });
}

// 必要数（ALLOC_FILLINGS順）を「テープ」として、出勤メンバーの設定生産数(cap)で
// 順番に切り出していく。1人のメンバーが今の具材で使い切れなければ次の具材に進み、
// capが先に尽きたら次のメンバーは同じ具材の続きから始める（境界の具材は前後で共有されうる）。
// これにより「1人1〜2種類に集中」「具材の割り振り数は必要数を超えない」
// 「メンバーの合計はcapを超えない」を同時に満たす。
// 必要数の多い具材から順に処理する。
// ・今の残り容量で1人に収まる具材は、その時点で合計が最も少ない人にまとめて割り振る（分散させない）
// ・1人に収まらない具材は、容量に余裕がある人のうち合計が最も少ない人から順に詰めていく
// これにより「1人で担当できる具材は1人に集中」「全員の合計がなるべく均等」を両立する。
function buildProductionPlan(day, working, memberCaps){
  const totals = working.map(() => 0);
  const remaining = working.map((_, i) => memberCaps[i]);
  const memberBreakdowns = working.map(() => ({}));
  const hqBreakdown = {};

  function pickLeastLoaded(minRoom){
    let best = -1;
    for(let i = 0; i < working.length; i++){
      if(remaining[i] >= minRoom && (best === -1 || totals[i] < totals[best])) best = i;
    }
    return best;
  }

  function give(mi, f, qty){
    if(qty <= 0) return;
    memberBreakdowns[mi][f] = (memberBreakdowns[mi][f] || 0) + qty;
    totals[mi] += qty;
    remaining[mi] -= qty;
  }

  const itemsByNeedDesc = ALLOC_FILLINGS
    .map(f => ({ f, need: neededQtyFor(day, f) }))
    .sort((a, b) => b.need - a.need);

  itemsByNeedDesc.forEach(({ f, need }) => {
    let left = need;
    if(left <= 0) return;

    // 今の残り容量で1人に収まるなら、その人だけに集中させる
    const singleIdx = pickLeastLoaded(left);
    if(singleIdx !== -1){
      const floored = Math.floor(left / 3) * 3;
      give(singleIdx, f, floored);
      left -= floored;
      if(left > 0) hqBreakdown[f] = (hqBreakdown[f] || 0) + left;
      return;
    }

    // 1人に収まらない → 容量に余裕がある人から順に、合計が少ない人優先で詰める
    while(left > 0){
      const idx = pickLeastLoaded(3);
      if(idx === -1) break;
      const take = Math.min(left, remaining[idx]);
      const floored = Math.floor(take / 3) * 3;
      if(floored <= 0) break;
      give(idx, f, floored);
      left -= floored;
    }
    if(left > 0) hqBreakdown[f] = (hqBreakdown[f] || 0) + left;
  });

  ALWAYS_HQ_FILLINGS.forEach(f => {
    const v = neededQtyFor(day, f);
    if(v > 0) hqBreakdown[f] = (hqBreakdown[f] || 0) + v;
  });

  return { memberBreakdowns, memberQtys: totals, hqBreakdown };
}

// 合計個数（松木さんが調整可能。デフォルトは希望数）
function getEffectiveTotal(day, name){
  if(day.memberTotalOverride && name in day.memberTotalOverride) return day.memberTotalOverride[name];
  return getManualQty(day, name);
}

// 合計個数が変わったら、その日の割り振りを丸ごと自動再計算する
function resetDayPlan(day){
  day.editableLines = {};
}

// その日の最終生産割り振りの確定版データを1ヶ所で計算する（描画・確定保存の両方で共用）
function computeDaySnapshot(day){
  const chise = state.chiseByDate[mdLabel(day.dateObj)];
  const chiseQty = chise ? chise.subtotal : 0;
  const total = (zuidFinal(day) || 0) + (uvaFinal(day) || 0) + chiseQty;

  const working = MEMBERS.filter(name => getManualQty(day, name) > 0);
  const memberCaps = working.map(name => getEffectiveTotal(day, name));

  // 合計個数入力欄に必ずデフォルト値が表示されるよう、override未設定のメンバーにも値を確定させておく
  if(!day.memberTotalOverride) day.memberTotalOverride = {};
  working.forEach((name, i) => {
    if(!(name in day.memberTotalOverride)) day.memberTotalOverride[name] = memberCaps[i];
  });

  const capTotal = memberCaps.reduce((s, v) => s + v, 0);

  // 総生産数 = 販売予測数カードの合計（Zuid＋UvA＋チセ）。チセも受け取り先として総生産数に含む
  const allocationTarget = total;
  const isOverCap = capTotal > allocationTarget;

  const { memberBreakdowns } = buildProductionPlan(day, working, memberCaps);
  ensureEditableLines(day, working, memberBreakdowns);

  // ニギニギ隊合計は「現在実際に割り振られている個数」（手動編集も含む）の合計
  const editedMemberTotals = working.map(name => (day.editableLines[name] || []).reduce((s, l) => s + (l.qty || 0), 0));
  const ningiTotal = editedMemberTotals.reduce((s, v) => s + v, 0);

  // 本部の具材内訳：具材ごとに「販売予測数の必要数（Zuid＋UvA＋チセ） − ニギニギ隊全員の実際の生産量」の残り。
  // チセさんは生産者ではなく受け取り先のため、必要数（neededQtyFor）には含めるが、生産量からは引かない。
  // 具材プルダウンは7種類全てから選べる（枝豆・梅も含む）ため、特例なしで全具材に同じ式を適用する。
  const producedByFilling = {};
  working.forEach(name => {
    (day.editableLines[name] || []).forEach(line => {
      if(line.qty > 0) producedByFilling[line.filling] = (producedByFilling[line.filling] || 0) + line.qty;
    });
  });
  const hqBreakdown = {};
  const hqDebugRows = [];
  FILLINGS.forEach(f => {
    const needed = neededQtyFor(day, f);
    const produced = producedByFilling[f] || 0;
    const remainder = needed - produced;
    if(remainder > 0) hqBreakdown[f] = remainder;
    hqDebugRows.push({ 具材: f, 必要数: needed, ニギニギ隊生産量: produced, 本部分: Math.max(0, remainder) });
  });

  // 本部合計は「全具材の本部分の合計」を正式な値とする（独立した別計算式は使わない）
  const hqQty = Object.values(hqBreakdown).reduce((s, v) => s + v, 0);

  console.log(`[本部内訳検証] ${day.label || day.dateKey}`, hqDebugRows);
  console.log(`[本部内訳検証] 本部合計（全具材の本部分の合計）=${hqQty}`);

  return {
    chiseQty, total, working, memberCaps, capTotal, allocationTarget, isOverCap,
    hqBreakdown, hqQty, editedMemberTotals, ningiTotal,
  };
}

// 具材内訳・チェック表示など「ユーザーが直接編集しない」部分のHTML
function deriveBlocksHtml(snap){
  const { working, memberCaps, isOverCap, hqBreakdown, hqQty, ningiTotal, allocationTarget } = snap;

  const ningiBreakdownSummary = working.length
    ? working.map((name, i) => `${name}:${memberCaps[i]}`).join(" ")
    : "なし";

  // チセさんは生産者ではなく受け取り先のため、最終生産割り振りには一切表示・計算しない。
  // 「総生産数」はZuid＋UvAの必要数合計。
  const summaryHtml = `
    <div>総生産数：${allocationTarget}個</div>
    <div>ニギニギ隊合計：${ningiTotal}個（${ningiBreakdownSummary}）</div>
    <div>本部：${hqQty}個（自動計算）</div>
    ${isOverCap ? `<div class="warning-line">⚠️ ニギニギ隊の設定生産数が総生産数を超えています</div>` : ""}
  `;

  const hqHtml = `
    <div class="prod-row-head">本部（自動算出：${hqQty}個）</div>
    <div class="prod-row-body">${pillsHtml(hqBreakdown)}</div>
  `;

  // 合計チェック：ニギニギ隊合計＋本部製造数＝総生産数（チセは含めない）
  const reconciledTotal = ningiTotal + hqQty;
  const isMismatch = reconciledTotal !== allocationTarget;
  const checkHtml = isMismatch
    ? `<div class="warning-line">⚠️ 合計が合いません（${reconciledTotal}個 / 必要 ${allocationTarget}個）</div>`
    : `<div class="ok-line">✓ OK（${reconciledTotal}個）</div>`;

  return { summaryHtml, hqHtml, checkHtml };
}

// 1人分の行（具材名・個数・合計個数の入力欄を含む）。ユーザーが直接編集する部分。

  return `

      <div class="line-row">
        <span class="line-unit">合計個数：</span>
        <input type="text" inputmode="numeric" pattern="[0-9]*" class="total-override-input" value="${cap}" data-key="${day.dateKey}" data-name="${name}">
        <span class="line-unit">個</span>
      </div>
      ${linesHtml}
      <button type="button" class="add-line-btn" data-key="${day.dateKey}" data-name="${name}">＋具材を追加</button>
      <div class="prod-row-foot" id="memberFooter-${day.dateKey}-${name}">合計：${editedTotal}個</div>
      <div class="member-mismatch" id="memberMismatch-${day.dateKey}-${name}" ${mismatch ? "" : 'style="display:none;"'}>⚠️ 合計が合いません（${editedTotal}個 / 設定${cap}個）</div>
    </div>
  `;
}

function productionDayHtml(day){
  const snap = computeDaySnapshot(day);
  const { summaryHtml, hqHtml, checkHtml } = deriveBlocksHtml(snap);

  const bulkActionsHtml = `
    <div class="bulk-actions">
      <button type="button" class="bulk-btn ${day.bulkValue === 24 ? "active" : ""}" data-key="${day.dateKey}" data-val="24">全員24個</button>
      <button type="button" class="bulk-btn ${day.bulkValue === 27 ? "active" : ""}" data-key="${day.dateKey}" data-val="27">全員27個</button>
      <button type="button" class="bulk-btn ${day.bulkValue === 30 ? "active" : ""}" data-key="${day.dateKey}" data-val="30">全員30個</button>
    </div>
  `;

  const memberRowsHtml = snap.working.length
    ? snap.working.map((name, i) => memberRowHtml(day, snap, i)).join("")
    : `<p class="off-note">出勤予定のメンバーがいません。</p>`;

  return `
    <div class="fd-head">${day.label}</div>
    ${bulkActionsHtml}
    <div class="prod-summary" id="summaryBlock-${day.dateKey}">${summaryHtml}</div>
    <div id="memberRowsArea-${day.dateKey}">${memberRowsHtml}</div>
    <div class="prod-row" id="hqBlock-${day.dateKey}">${hqHtml}</div>
    <div id="checkBlock-${day.dateKey}">${checkHtml}</div>
  `;
}

// 本部の内訳・合計チェックなど「ユーザーが編集しない」部分だけを更新する。
// メンバーの合計個数・具材名・個数の入力欄には一切触れない。
function refreshDerived(day){
  const snap = computeDaySnapshot(day);
  const { summaryHtml, hqHtml, checkHtml } = deriveBlocksHtml(snap);

  const summaryEl = document.getElementById(`summaryBlock-${day.dateKey}`);
  if(summaryEl) summaryEl.innerHTML = summaryHtml;

  const hqEl = document.getElementById(`hqBlock-${day.dateKey}`);
  if(hqEl) hqEl.innerHTML = hqHtml;

  const checkEl = document.getElementById(`checkBlock-${day.dateKey}`);
  if(checkEl) checkEl.innerHTML = checkHtml;

  snap.working.forEach((name, i) => {
    const footerEl = document.getElementById(`memberFooter-${day.dateKey}-${name}`);
    if(footerEl) footerEl.textContent = `合計：${snap.editedMemberTotals[i]}個`;

    const mismatchEl = document.getElementById(`memberMismatch-${day.dateKey}-${name}`);
    if(mismatchEl){
      const mismatch = snap.editedMemberTotals[i] !== snap.memberCaps[i];
      mismatchEl.style.display = mismatch ? "" : "none";
      if(mismatch){
        mismatchEl.textContent = `⚠️ 合計が合いません（${snap.editedMemberTotals[i]}個 / 設定${snap.memberCaps[i]}個）`;
      }
    }
  });
}

// 合計個数(total-override-input)の入力中に、行の入れ替えなしで具材個数入力欄の表示だけを同期する。
// 行数が変わっていれば false を返し、呼び出し側でその人の行を丸ごと再生成させる。
function updateLineInputsDom(day, name){
  const lines = day.editableLines[name] || [];
  const row = document.getElementById(`memberRow-${day.dateKey}-${name}`);
  if(!row) return false;
  const lineInputs = row.querySelectorAll(".line-qty-input");
  if(lineInputs.length !== lines.length) return false;
  lineInputs.forEach((input, i) => { input.value = lines[i].qty; });
  return true;
}

// 1人分の行だけを丸ごと再生成する（具材の追加・削除・合計個数変更など、行の構成自体が変わる場合に使う）
function refreshMemberRow(day, name){
  const snap = computeDaySnapshot(day);
  const idx = snap.working.indexOf(name);
  const rowEl = document.getElementById(`memberRow-${day.dateKey}-${name}`);
  if(idx === -1 || !rowEl){
    refreshProductionDay(day);
    return;
  }
  rowEl.outerHTML = memberRowHtml(day, snap, idx);
  bindMemberRowEvents(day, name);
  refreshDerived(day);
}

// 合計個数（cap）が変わったとき、既存の具材構成（種類）は保ったまま個数だけを比例配分し直す
function rescaleMemberLines(day, name, newTotal){
  const lines = day.editableLines[name] || [];

  if(lines.length === 0){
    day.editableLines[name] = newTotal > 0 ? [{ filling: ALLOC_FILLINGS[0], qty: newTotal }] : [];
    return;
  }

  const oldTotal = lines.reduce((s, l) => s + (l.qty || 0), 0);
  if(oldTotal === 0){
    day.editableLines[name] = lines.map((l, i) => ({ filling: l.filling, qty: i === 0 ? newTotal : 0 }));
    return;
  }

  let allocated = 0;
  const rescaled = lines.map((l, i) => {
    if(i === lines.length - 1){
      return { filling: l.filling, qty: Math.max(0, newTotal - allocated) };
    }
    const qty = Math.floor(((l.qty / oldTotal) * newTotal) / 3) * 3;
    allocated += qty;
    return { filling: l.filling, qty };
  });
  day.editableLines[name] = rescaled;
}

function refreshProductionDay(day){
  const container = document.getElementById(`prodday-${day.dateKey}`);
  if(!container) return;
  container.innerHTML = productionDayHtml(day);
  bindProductionDayEvents(day);
}

// 1人分の行の中の入力（具材名・個数）だけをバインドする
function bindMemberRowEvents(day, name){
  const row = document.getElementById(`memberRow-${day.dateKey}-${name}`);
  if(!row) return;

  row.querySelectorAll(".line-filling-select").forEach(sel => {
    sel.addEventListener("change", () => {
      const li = parseInt(sel.dataset.line, 10);
      if(day.editableLines[name] && day.editableLines[name][li]){
        day.editableLines[name][li].filling = sel.value;
      }
      // 具材名の変更は個数を変えないので、本部内訳・チェックだけ更新（他の入力欄には触れない）
      refreshDerived(day);
    });
  });

  row.querySelectorAll(".line-qty-input").forEach(input => {
    input.addEventListener("input", () => {
      const li = parseInt(input.dataset.line, 10);
      if(day.editableLines[name] && day.editableLines[name][li]){
        day.editableLines[name][li].qty = Math.max(0, parseInt(input.value, 10) || 0);
      }
      // 入力中でも本部内訳・チェックはリアルタイム更新するが、入力欄自体は再生成しない
      refreshDerived(day);
    });
  });

  row.querySelectorAll(".line-qty-step-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const li = btn.dataset.line;
      const input = row.querySelector(`.line-qty-input[data-line="${li}"]`);
      if(!input) return;
      const delta = btn.dataset.action === "inc" ? 1 : -1;
      input.value = Math.max(0, (parseInt(input.value, 10) || 0) + delta);
      input.dispatchEvent(new Event("input", { bubbles: true }));
    });
  });

  row.querySelectorAll(".line-delete-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const li = parseInt(btn.dataset.line, 10);
      if(day.editableLines[name]) day.editableLines[name].splice(li, 1);
      refreshMemberRow(day, name);
    });
  });

  row.querySelectorAll(".add-line-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      if(!day.editableLines[name]) day.editableLines[name] = [];
      day.editableLines[name].push({ filling: ALLOC_FILLINGS[0], qty: 0 });
      refreshMemberRow(day, name);
    });
  });

  row.querySelectorAll(".total-override-input").forEach(input => {
    // 入力ごとにリアルタイムで再計算するが、この入力欄自体は再生成しない（フォーカスを失わない）
    input.addEventListener("input", () => {
      const newTotal = Math.max(0, parseInt(input.value, 10) || 0);
      if(!day.memberTotalOverride) day.memberTotalOverride = {};
      day.memberTotalOverride[name] = newTotal;
      rescaleMemberLines(day, name, newTotal); // この人の具材構成は保ったまま個数だけ配分し直す

      const synced = updateLineInputsDom(day, name);
      if(!synced){
        // 具材の行数が変わった場合（0行⇔1行など）だけ、この人の行を再生成する
        refreshMemberRow(day, name);
        return;
      }
      refreshDerived(day);
    });
  });
}

function bindProductionDayEvents(day){
  const container = document.getElementById(`prodday-${day.dateKey}`);
  if(!container) return;

  MEMBERS.forEach(name => bindMemberRowEvents(day, name));

  container.querySelectorAll(".bulk-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const val = parseInt(btn.dataset.val, 10);
      const working = MEMBERS.filter(name => getManualQty(day, name) > 0);
      if(working.length === 0) return;

      day.bulkValue = val;
      if(!day.memberTotalOverride) day.memberTotalOverride = {};
      working.forEach(name => { day.memberTotalOverride[name] = val; });
      resetDayPlan(day);
      refreshProductionDay(day);
    });
  });
}

// メンバー別の具材割り振りを文字列化（例："ツナマヨ×15 スパイシーツナマヨ×9"）
function fillingLinesToString(lines){
  return (lines || []).filter(l => l.qty > 0).map(l => `${l.filling}×${l.qty}`).join(" ");
}

function hqBreakdownToString(hqBreakdown){
  return Object.entries(hqBreakdown).filter(([, q]) => q > 0).map(([f, q]) => `${f}×${q}`).join(" ");
}

async function confirmWeek(weekIndex){
  const days = state.days.filter(d => d.weekIndex === weekIndex);
  const payload = {
    type: "confirmPlan",
    days: days.map(d => {
      const snap = computeDaySnapshot(d);
      const ningiBreakdown = snap.working
        .map(name => `${name}:${fillingLinesToString(d.editableLines[name])}`)
        .join("；");

      return {
        date: mdLabel(d.dateObj),
        day: `${DAY_NAMES[d.dow]}曜日`,
        zuid: zuidFinal(d),
        uva: uvaFinal(d),
        chise: snap.chiseQty,
        ningiBreakdown,
        hqQty: snap.hqQty,
        hqBreakdown: hqBreakdownToString(snap.hqBreakdown),
      };
    }),
  };

  const statusEl = document.getElementById(`weekStatus${weekIndex}`);
  statusEl.textContent = "送信中...";

  console.log("確定データ送信:", JSON.stringify(payload));
  console.log("確定データ:", JSON.stringify(payload.days));

  try{
    const result = await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(payload),
    });
    console.log("送信成功:", result);
    statusEl.textContent = "確定・公開しました ✓";
  }catch(e){
    console.error("送信失敗:", e);
    statusEl.textContent = "送信に失敗しました";
  }
}

/* ---------- レンダリング：シフト一覧 ---------- */

function renderShiftTable(){
  const area = document.getElementById("shiftTableArea");

  const headerCells = state.days.map(d => `<th>${DAY_NAMES[d.dow]}曜<br>${d.dateObj.getMonth() + 1}/${d.dateObj.getDate()}</th>`).join("");

  const bodyRows = MEMBERS.map(name => {
    const cells = state.days.map(day => {
      const shiftKey = mdLabel(day.dateObj);
      const submitted = state.shiftByDate[shiftKey] && state.shiftByDate[shiftKey][name];
      const display = submitted
        ? `<div class="manual-readonly">${getManualQty(day, name)}個</div>`
        : `<div class="manual-readonly unanswered">未回答</div>`;
      return `<td>${display}</td>`;
    }).join("");
    return `<tr><td><strong>${name}</strong></td>${cells}</tr>`;
  }).join("");

  area.innerHTML = `
    <table>
      <thead><tr><th>メンバー</th>${headerCells}</tr></thead>
      <tbody>${bodyRows}</tbody>
    </table>
  `;
}

/* ---------- シフト希望の再読み込み ---------- */

async function refreshShiftData(){
  const btn = document.getElementById("refreshShiftBtn");
  if(!btn) return;

  const originalLabel = "🔄 希望シフトを更新";
  btn.disabled = true;
  btn.classList.remove("success");
  btn.textContent = "読み込み中...";

  try{
    const shiftJson = await fetchSheetJson("シフト回答", SHIFT_SPREADSHEET_ID);
    state.shiftByDate = shiftJson ? parseShiftSheet(shiftJson) : {};

    renderShiftTable();
    renderProductionSection();

    btn.classList.add("success");
    btn.textContent = "✓ 更新しました";
  }catch(e){
    console.error("シフト希望の再読み込みに失敗しました", e);
    btn.textContent = "✕ 更新に失敗しました";
  }finally{
    setTimeout(() => {
      btn.disabled = false;
      btn.classList.remove("success");
      btn.textContent = originalLabel;
    }, 2000);
  }
}

/* ---------- 初期化 ---------- */

async function init(){
  try{
    const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
      `&daily=temperature_2m_max,temperature_2m_min,weathercode` +
      `&hourly=temperature_2m,precipitation,weathercode` +
      `&forecast_days=16&timezone=Europe%2FAmsterdam`;

    const thisYear = new Date().getFullYear();
    const [weatherRes, chiseJson, shiftJson, holidaysByIso, nsDisruptionsByDate] = await Promise.all([
      fetch(weatherUrl).then(r => r.json()),
      fetchSheetJson(null).catch(e => { console.error("チセさんシート取得失敗", e); return null; }),
      fetchSheetJson("シフト回答", SHIFT_SPREADSHEET_ID).catch(e => { console.error("シフト回答シート取得失敗", e); return null; }),
      fetchDutchHolidays([thisYear, thisYear + 1]),
      fetchNsDisruptions(),
    ]);

    state.holidaysByIso = holidaysByIso;
    state.nsDisruptionsByDate = nsDisruptionsByDate;
    const hourlyByDate = buildHourlyByDate(weatherRes.hourly);
    state.days = buildDays(weatherRes.daily, hourlyByDate);
    state.chiseByDate = chiseJson ? parseChiseSheet(chiseJson) : {};
    state.shiftByDate = shiftJson ? parseShiftSheet(shiftJson) : {};

    renderCalendar();
    renderShiftTable();
    renderProductionSection();

    const refreshBtn = document.getElementById("refreshShiftBtn");
    if(refreshBtn) refreshBtn.addEventListener("click", refreshShiftData);
  }catch(e){
    console.error(e);
    document.getElementById("calendarArea").innerHTML = "<p class='off-note'>データの取得に失敗しました。</p>";
    document.getElementById("shiftTableArea").innerHTML = "<p class='off-note'>データの取得に失敗しました。</p>";
    document.getElementById("productionArea").innerHTML = "<p class='off-note'>データの取得に失敗しました。</p>";
  }
}

init();

// 画面幅が変わるとテーブルの列幅も変わるため、ヘッダーのZuid/UvA枠の位置を再調整する
let alignResizeTimer = null;
window.addEventListener("resize", () => {
  clearTimeout(alignResizeTimer);
  alignResizeTimer = setTimeout(() => {
    state.days.forEach(day => alignDayStoreBoxes(day));
  }, 150);
});
</script>
