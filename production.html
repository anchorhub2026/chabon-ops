<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生産指示書｜Chabon Ops</title>
<style>
  :root{
    --main: #4a7c59;
    --main-dark: #335c3e;
    --main-light: #e9f1ea;
    --accent: #c9533f;
    --bg: #faf8f3;
    --card: #ffffff;
    --ink: #2b2b28;
    --line: #e2ddd0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
  }
  header{
    background: var(--main);
    color: #fff;
    padding: 20px 16px;
    text-align: center;
  }
  header h1{ margin: 0; font-size: 1.3rem; letter-spacing: 0.05em; }
  header p{ margin: 6px 0 0; font-size: 0.82rem; opacity: 0.9; }
  .header-nav{ margin-top: 12px; }
  .header-nav a{
    display: inline-block;
    background: rgba(255,255,255,0.15);
    color: #fff;
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: bold;
    padding: 7px 16px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.4);
    margin: 0 4px;
  }
  main{
    max-width: 560px;
    margin: 0 auto;
    padding: 18px 16px 60px;
  }
  .loading, .off-note{ color: #999; font-size: 0.9rem; text-align: center; padding: 20px; }

  .list-title{
    text-align: center;
    color: var(--main-dark);
    font-weight: bold;
    font-size: 1rem;
    letter-spacing: 0.05em;
    margin: 4px 0 20px;
  }
  .list-title::before,
  .list-title::after{
    content: "～";
    color: var(--main);
    margin: 0 8px;
  }

  .day-block{ padding: 14px 2px; }
  .day-title{
    font-size: 1.08rem;
    font-weight: bold;
    color: var(--main-dark);
    margin-bottom: 10px;
  }
  .line-row{
    padding: 6px 0 6px 4px;
    font-size: 0.95rem;
    border-bottom: 1px dashed var(--line);
  }
  .line-row:last-of-type{ border-bottom: none; }
  .line-row .who{
    font-weight: bold;
    color: var(--main-dark);
  }
  .line-row .items{ color: var(--ink); }
  .line-row .items.empty{ color: #aaa; }
  .line-row.hq{
    margin-top: 4px;
    background: var(--main-light);
    border-radius: 8px;
    padding: 8px 10px;
    border-bottom: none;
  }
  .line-row.hq .who{ color: var(--main-dark); }

  .day-divider{
    border: none;
    border-top: 2px dashed var(--line);
    margin: 4px 0 4px;
  }

  .confirmed-at{
    font-size: 0.72rem;
    color: #aaa;
    text-align: right;
    margin-top: 4px;
  }

  footer{
    text-align:center;
    font-size: 0.78rem;
    color: #999;
    padding: 20px 0 40px;
  }
</style>
</head>
<body>

<header>
  <h1>🍙 Chabon Ops</h1>
  <p>📋 生産指示書（ニギニギ隊向け）</p>
  <nav class="header-nav">
    <a href="index.html">← トップへ</a>
    <a href="shift.html">シフト入力</a>
  </nav>
</header>

<main>
  <div id="planArea"><p class="loading">読み込み中...</p></div>
</main>

<footer>Chabon Ops — Amsterdam Onigiri Truck</footer>

<script>
const SHIFT_SPREADSHEET_ID = "1PHf1o3smqIQdeFkhBHjBZUEub7VtRcynQLllmSR7w-s";
const DAY_NAMES = ["日","月","火","水","木","金","土"];

async function fetchSheetJson(sheetName, spreadsheetId){
  const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json` +
    (sheetName ? `&sheet=${encodeURIComponent(sheetName)}` : "");
  const res = await fetch(url);
  const text = await res.text();
  const match = text.match(/setResponse\(([\s\S]*)\);\s*$/);
  if(!match) throw new Error("シートの解析に失敗しました: " + sheetName);
  return JSON.parse(match[1]);
}

// "ツナマヨ×15 スパイシーツナマヨ×9" → [{filling:"ツナマヨ",qty:15}, ...]
function parseFillingString(str){
  if(!str) return [];
  return str.trim().split(/\s+/).filter(Boolean).map(part => {
    const [filling, qtyStr] = part.split("×");
    return { filling, qty: parseInt(qtyStr, 10) || 0 };
  });
}

// "YUMI:ツナマヨ×15 スパイシー×9；MARI:..." → [{name, items, total}]
function parseNingiBreakdown(str){
  if(!str) return [];
  return str.split("；").filter(Boolean).map(part => {
    const idx = part.indexOf(":");
    const name = idx === -1 ? part : part.slice(0, idx);
    const itemsStr = idx === -1 ? "" : part.slice(idx + 1);
    const items = parseFillingString(itemsStr);
    const total = items.reduce((s, it) => s + it.qty, 0);
    return { name, items, total };
  });
}

// "6/23" のような月日ラベルから、今日に近い実際の日付を推測する（年をまたぐケースに対応）
function inferDate(mdStr, today){
  const [m, d] = mdStr.split("/").map(n => parseInt(n, 10));
  if(!m || !d) return null;
  let year = today.getFullYear();
  let candidate = new Date(year, m - 1, d);
  const diffDays = (candidate - today) / 86400000;
  if(diffDays < -180) candidate = new Date(year + 1, m - 1, d);
  else if(diffDays > 180) candidate = new Date(year - 1, m - 1, d);
  return candidate;
}

function itemsText(items){
  if(!items || items.length === 0) return "";
  return items.map(it => `${it.filling}×${it.qty}`).join(" ");
}

function dayBlockHtml(plan, isLast){
  const memberLines = plan.members.map(m => `
    <div class="line-row">
      <span class="who">${m.name}：</span>
      <span class="items ${m.items.length ? "" : "empty"}">${itemsText(m.items) || "割り振りなし"}</span>
    </div>
  `).join("");

  const hqLine = `
    <div class="line-row hq">
      <span class="who">本部：</span>
      <span class="items ${plan.hqItems.length ? "" : "empty"}">${itemsText(plan.hqItems) || "なし"}</span>
    </div>
  `;

  return `
    <div class="day-block">
      <div class="day-title">📅 ${plan.dateLabel}（${plan.dayName}）</div>
      ${plan.members.length ? memberLines : `<p class="off-note">ニギニギ隊の割り振りデータがありません。</p>`}
      ${hqLine}
      ${plan.confirmedAt ? `<div class="confirmed-at">確定日時：${plan.confirmedAt}</div>` : ""}
    </div>
    ${isLast ? "" : `<hr class="day-divider">`}
  `;
}

async function init(){
  const area = document.getElementById("planArea");
  try{
    console.log("[production.html] 確定プランシートを取得します", SHIFT_SPREADSHEET_ID);
    const json = await fetchSheetJson("確定プラン", SHIFT_SPREADSHEET_ID);
    console.log("[production.html] gviz レスポンス（生データ）:", json);

    const rawRows = json.table.rows || [];
    console.log("[production.html] 行数:", rawRows.length);

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    // 同じ日付が複数行ある場合は、シート上で後ろにある行（最新）で上書きする
    const byDate = new Map();
    rawRows
      .filter(r => r.c && r.c[0])
      .forEach(r => {
        const c = r.c;
        // 日付・確定日時はシート上で日付型になっているため、表示用文字列(f)を優先して使う
        const dateLabel = c[0] ? String(c[0].f || c[0].v || "") : "";
        if(!dateLabel) return;
        const dayName = (c[1] && c[1].v) || "";
        const zuid = Number(c[2] && c[2].v) || 0;
        const uva = Number(c[3] && c[3].v) || 0;
        const chise = Number(c[4] && c[4].v) || 0;
        const members = parseNingiBreakdown(c[5] && c[5].v);
        const hqQty = Number(c[6] && c[6].v) || 0;
        const hqItems = parseFillingString(c[7] && c[7].v);
        const confirmedAt = c[8] ? String(c[8].f || c[8].v || "") : "";
        const total = zuid + uva + chise;
        byDate.set(dateLabel, { dateLabel, dayName, zuid, uva, chise, members, hqQty, hqItems, confirmedAt, total, sortDate: inferDate(dateLabel, today) });
      });

    const plans = Array.from(byDate.values())
      .filter(p => p.sortDate && p.sortDate >= today)
      .sort((a, b) => a.sortDate - b.sortDate);

    console.log("[production.html] 解析後のプラン件数（今日以降・重複排除済み）:", plans.length, plans);

    if(plans.length === 0){
      area.innerHTML = `<p class="off-note">確定済みの生産プランがまだありません。<br>管理画面で「この週を確定・公開する」を押すと表示されます。</p>`;
      return;
    }

    area.innerHTML = `
      <div class="list-title">今週の生産指示</div>
      ${plans.map((plan, i) => dayBlockHtml(plan, i === plans.length - 1)).join("")}
    `;
  }catch(e){
    console.error("[production.html] データ取得・解析に失敗しました", e);
    area.innerHTML = `<p class="off-note">データの取得に失敗しました。</p>`;
  }
}

init();
</script>

</body>
</html>
