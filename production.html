<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生産カレンダー｜Chabon Ops</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --main: #4a7c59;
    --main-dark: #335c3e;
    --main-light: #e9f1ea;
    --accent: #c9533f;
    --bg: #faf8f3;
    --card: #ffffff;
    --ink: #2b2b28;
    --line: #e2ddd0;
    --admin-dark: #233b2c;
    --sun: #b83030;
  }

  *{ box-sizing: border-box; }

  body{
    margin: 0;
    font-family: "DM Sans", "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
  }

  /* ── Header（admin.htmlと統一） ── */
  header{
    background: var(--admin-dark);
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .header-left h1{
    margin: 0;
    font-family: "Noto Serif JP", serif;
    font-size: 1.25rem;
    letter-spacing: 0.05em;
  }
  .header-left p{ margin: 3px 0 0; font-size: 0.78rem; opacity: 0.72; }
  .header-nav{ margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
  .header-nav a{
    display: inline-block;
    background: rgba(255,255,255,0.12);
    color: #fff;
    text-decoration: none;
    font-size: 0.78rem;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.28);
    transition: background 0.15s;
  }
  .header-nav a:hover{ background: rgba(255,255,255,0.22); }
  .header-logo{
    height: 50px;
    width: auto;
    object-fit: contain;
    flex-shrink: 0;
  }

  /* ── Month nav ── */
  .month-nav{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 12px 20px;
    background: var(--main-light);
    border-bottom: 2px solid var(--line);
  }
  .month-nav button{
    background: var(--main);
    color: #fff;
    border: none;
    border-radius: 100px;
    padding: 6px 18px;
    font-size: 0.8rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }
  .month-nav button:hover{ background: var(--main-dark); }
  .month-title{
    font-family: "Noto Serif JP", serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--main-dark);
    min-width: 120px;
    text-align: center;
    letter-spacing: 0.06em;
  }

  /* ── Main wrapper ── */
  .main-wrap{
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px 14px 60px;
  }

  /* ── Calendar card（sectionと統一） ── */
  .cal-card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* ── Table ── */
  .cal{
    width: 100%;
    min-width: 380px;
    border-collapse: separate;
    border-spacing: 4px;
    table-layout: fixed;
  }

  /* 曜日ヘッダー */
  .cal thead th{
    background: var(--main);
    color: #fff;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 7px 4px;
    text-align: center;
    letter-spacing: 0.06em;
    border-radius: 8px;
  }
  .cal thead th.col-sun{ background: #8b2222; }

  /* td（セル外枠）*/
  .cal tbody td{
    vertical-align: top;
    background: transparent;
    padding: 0;
    width: calc(100% / 6);
  }

  /* セル本体 */
  .cell{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px 7px 7px;
    min-height: 82px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }

  /* 今日 */
  td.is-today .cell{
    background: var(--main-light);
    border: 2px solid var(--main);
    box-shadow: 0 0 0 3px rgba(74,124,89,0.12);
  }

  /* 過去日 */
  td.is-past .cell{
    background: #f5f4f0;
    border-color: #e6e2d8;
    box-shadow: none;
  }

  /* 空きセル */
  td.empty-cell{ background: transparent; }

  /* ── 日付数字エリア ── */
  .cell-date{
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 5px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--line);
  }
  td.is-today .cell-date{ border-bottom-color: rgba(74,124,89,0.25); }

  .date-num{
    font-family: "DM Sans", sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }
  .cell-date.is-sun .date-num{ color: var(--sun); }
  td.is-today .cell-date .date-num{ color: var(--main-dark); }

  .today-badge{
    font-size: 0.52rem;
    font-weight: 700;
    background: var(--main);
    color: #fff;
    padding: 1px 6px;
    border-radius: 100px;
    letter-spacing: 0.04em;
    line-height: 1.5;
  }

  /* ── メンバーブロック ── */
  .member{ margin-bottom: 2px; }

  /* 名前（左）＋合計数（右）を横並び */
  .member-header{
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 4px;
    margin-bottom: 1px;
  }
  .member-name{
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--main-dark);
    letter-spacing: 0.02em;
    line-height: 1.3;
    white-space: nowrap;
  }
  td.is-past .member-name{ color: #7a9080; }

  .member-subtotal{
    font-family: "DM Sans", sans-serif;
    font-size: 1rem;        /* ≈16px */
    font-weight: 700;
    color: var(--main);
    line-height: 1;
    white-space: nowrap;
    flex-shrink: 0;
  }
  td.is-past .member-subtotal{ color: #8aab94; }

  /* 具材行（縦並び・インデント） */
  .filling-row{
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 2px;
    padding-left: 8px;
    line-height: 1.45;
  }
  .filling-name{
    font-size: 0.58rem;
    color: #727268;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  td.is-past .filling-name{ color: #9a9a90; }

  .filling-qty{
    font-family: "DM Sans", sans-serif;
    font-size: 0.58rem;
    font-weight: 500;
    color: #505048;
    flex-shrink: 0;
    white-space: nowrap;
  }
  td.is-past .filling-qty{ color: #9a9a90; }

  /* メンバー間の区切り線 */
  .member-sep{
    border: none;
    border-top: 1px solid var(--line);
    margin: 4px 0;
  }
  td.is-today .member-sep{ border-color: rgba(74,124,89,0.2); }

  /* ── TOTAL バー ── */
  .cell-total{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
    background: var(--main);
    color: #fff;
    border-radius: 7px;
    padding: 4px 8px;
    font-family: "DM Sans", sans-serif;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .total-label{
    font-size: 0.62rem;
    opacity: 0.9;
  }
  .total-num{
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1;
  }
  td.is-past .cell-total{ background: #9aab9f; }

  /* ── 未確定 ── */
  .no-plan{
    font-size: 0.58rem;
    color: #ccc;
    text-align: center;
    margin-top: 10px;
    letter-spacing: 0.04em;
  }

  /* ── ローディング / エラー ── */
  .msg{ color: #999; font-size: 0.88rem; text-align: center; padding: 32px 16px; }

  /* ── フッター ── */
  footer{
    text-align: center;
    font-size: 0.75rem;
    color: #aaa;
    padding: 20px;
    border-top: 1px solid var(--line);
    letter-spacing: 0.05em;
    font-family: "DM Sans", sans-serif;
  }

  /* ── スマホ対応 ── */
  @media (max-width: 540px){
    header{ padding: 12px 14px; }
    .header-left h1{ font-size: 1.05rem; }
    .header-logo{ height: 40px; }
    .cal-card{ padding: 8px 6px; }
    .cal{ min-width: 320px; border-spacing: 3px; }
    .cal thead th{ font-size: 0.72rem; padding: 5px 2px; }
    .cell{ padding: 5px 4px 5px; min-height: 64px; border-radius: 8px; }
    .date-num{ font-size: 0.88rem; }
    .member-name{ font-size: 0.62rem; }
    .member-subtotal{ font-size: 0.85rem; }
    .filling-name, .filling-qty{ font-size: 0.52rem; }
    .filling-row{ padding-left: 5px; }
    .cell-total{ padding: 3px 6px; border-radius: 5px; }
    .total-label{ font-size: 0.56rem; }
    .total-num{ font-size: 0.82rem; }
    .month-title{ font-size: 0.95rem; min-width: 100px; }
    .month-nav button{ padding: 5px 13px; font-size: 0.75rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>🍙 Chabon Ops</h1>
    <p>生産カレンダー（ニギニギ隊向け）</p>
    <nav class="header-nav">
      <a href="index.html">← トップへ</a>
      <a href="shift.html">シフト入力</a>
    </nav>
  </div>
  <img src="chabon-logo.png" alt="CHABON STAND" class="header-logo">
</header>

<div class="month-nav">
  <button id="prevBtn">◀ 前月</button>
  <div class="month-title" id="monthTitle"></div>
  <button id="nextBtn">翌月 ▶</button>
</div>

<div class="main-wrap">
  <div class="cal-card">
    <div id="calArea"><p class="msg">読み込み中…</p></div>
  </div>
</div>

<footer>Chabon Ops — Amsterdam Onigiri Truck</footer>

<script>
const SPREADSHEET_ID = "1PHf1o3smqIQdeFkhBHjBZUEub7VtRcynQLllmSR7w-s";
const COL_LABELS = ["日","月","火","水","木","金"];

let dispYear, dispMonth;
let allPlans = {};

/* ── Data fetch & parse ── */
async function fetchSheetJson(sheetName){
  const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  const text = await res.text();
  const m = text.match(/setResponse\(([\s\S]*)\);\s*$/);
  if(!m) throw new Error("シート解析失敗: " + sheetName);
  return JSON.parse(m[1]);
}

function parseFillings(str){
  if(!str) return [];
  return str.trim().split(/\s+/).filter(Boolean).map(part => {
    const [filling, qtyStr] = part.split("×");
    return { filling: filling || "", qty: parseInt(qtyStr, 10) || 0 };
  });
}

function parseMembers(str){
  if(!str) return [];
  return str.split("；").filter(Boolean).map(part => {
    const idx = part.indexOf(":");
    const name = idx === -1 ? part.trim() : part.slice(0, idx).trim();
    const items = parseFillings(idx === -1 ? "" : part.slice(idx + 1));
    const total = items.reduce((s, it) => s + it.qty, 0);
    return { name, items, total };
  });
}

function inferDate(mdStr){
  const [m, d] = mdStr.split("/").map(Number);
  if(!m || !d) return null;
  const today = new Date();
  let yr = today.getFullYear();
  let cand = new Date(yr, m - 1, d);
  const diff = (cand - today) / 86400000;
  if(diff < -180) cand = new Date(yr + 1, m - 1, d);
  else if(diff > 180) cand = new Date(yr - 1, m - 1, d);
  return cand;
}

async function loadData(){
  const json = await fetchSheetJson("確定プラン");
  const rows = json.table.rows || [];
  const byLabel = new Map();

  rows.filter(r => r.c && r.c[0]).forEach(r => {
    const c = r.c;
    const dateLabel = String(c[0]?.f || c[0]?.v || "").trim();
    if(!dateLabel) return;
    const zuidQty  = Number(c[2]?.v) || 0;
    const uvaQty   = Number(c[3]?.v) || 0;
    const chiseQty = Number(c[4]?.v) || 0;
    const members  = parseMembers(c[5]?.v);
    const total    = zuidQty + uvaQty + chiseQty;
    const sortDate = inferDate(dateLabel);
    byLabel.set(dateLabel, { dateLabel, members, total, sortDate });
  });

  allPlans = {};
  byLabel.forEach(plan => {
    if(!plan.sortDate) return;
    const yr = plan.sortDate.getFullYear();
    const mo = plan.sortDate.getMonth() + 1;
    const dy = plan.sortDate.getDate();
    allPlans[`${yr}-${mo}-${dy}`] = plan;
  });
}

/* ── Calendar render ── */
function buildWeeks(yr, mo){
  const lastDay = new Date(yr, mo + 1, 0).getDate();
  const weeks = [];
  let week = new Array(6).fill(null);

  for(let d = 1; d <= lastDay; d++){
    const dow = new Date(yr, mo, d).getDay();
    if(dow === 6) continue;
    week[dow] = d;
    if(dow === 5){
      weeks.push(week);
      week = new Array(6).fill(null);
    }
  }
  if(week.some(v => v !== null)) weeks.push(week);
  return weeks;
}

function memberBlockHtml(m){
  let html = `<div class="member">`;
  html += `<div class="member-header">`;
  html += `<span class="member-name">${m.name}</span>`;
  html += `<span class="member-subtotal">${m.total}個</span>`;
  html += `</div>`;
  if(m.items.length){
    m.items.forEach(it => {
      html += `<div class="filling-row">`;
      html += `<span class="filling-name">・${it.filling}</span>`;
      html += `<span class="filling-qty">×${it.qty}</span>`;
      html += `</div>`;
    });
  }
  html += `</div>`;
  return html;
}

function renderCalendar(){
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const yr = dispYear;
  const mo = dispMonth;
  document.getElementById("monthTitle").textContent = `${yr}年${mo + 1}月`;

  const weeks = buildWeeks(yr, mo);

  let html = `<table class="cal"><thead><tr>`;
  COL_LABELS.forEach((lbl, i) => {
    html += `<th class="${i === 0 ? "col-sun" : ""}">${lbl}</th>`;
  });
  html += `</tr></thead><tbody>`;

  for(const wk of weeks){
    html += `<tr>`;
    for(let ci = 0; ci < 6; ci++){
      const day = wk[ci];
      if(day === null){
        html += `<td class="empty-cell"></td>`;
        continue;
      }
      const dateObj = new Date(yr, mo, day);
      const isToday = dateObj.getTime() === today.getTime();
      const isPast  = dateObj < today;
      const isSun   = ci === 0;
      const key     = `${yr}-${mo + 1}-${day}`;
      const plan    = allPlans[key];

      let tdCls = "";
      if(isToday) tdCls = "is-today";
      else if(isPast) tdCls = "is-past";

      html += `<td${tdCls ? ` class="${tdCls}"` : ""}>`;
      html += `<div class="cell">`;

      // 日付ヘッダー
      html += `<div class="cell-date${isSun ? " is-sun" : ""}">`;
      html += `<span class="date-num">${day}</span>`;
      if(isToday) html += `<span class="today-badge">TODAY</span>`;
      html += `</div>`;

      if(plan && plan.members.length > 0){
        plan.members.forEach((m, i) => {
          if(i > 0) html += `<hr class="member-sep">`;
          html += memberBlockHtml(m);
        });
        const dispTotal = plan.total > 0 ? plan.total
          : plan.members.reduce((s, m) => s + m.total, 0);
        html += `<div class="cell-total">`;
        html += `<span class="total-label">TOTAL</span>`;
        html += `<span class="total-num">${dispTotal}個</span>`;
        html += `</div>`;
      } else if(!isPast){
        html += `<div class="no-plan">未確定</div>`;
      }

      html += `</div></td>`;
    }
    html += `</tr>`;
  }

  html += `</tbody></table>`;
  document.getElementById("calArea").innerHTML = html;
}

/* ── Init ── */
async function init(){
  const now = new Date();
  dispYear  = now.getFullYear();
  dispMonth = now.getMonth();

  document.getElementById("prevBtn").addEventListener("click", () => {
    dispMonth--;
    if(dispMonth < 0){ dispMonth = 11; dispYear--; }
    renderCalendar();
  });
  document.getElementById("nextBtn").addEventListener("click", () => {
    dispMonth++;
    if(dispMonth > 11){ dispMonth = 0; dispYear++; }
    renderCalendar();
  });

  try{
    await loadData();
  }catch(e){
    console.error("[production.html] データ取得失敗", e);
    document.getElementById("calArea").innerHTML = '<p class="msg">データの取得に失敗しました。</p>';
    return;
  }
  renderCalendar();
}

init();
</script>
</body>
</html>
