<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="生産カレンダー">
<link rel="apple-touch-icon" href="./chabon-logo-production.png">
<title>生産カレンダー｜Chabon Ops</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --main: #4a7c59;
    --main-dark: #335c3e;
    --main-light: #e9f1ea;
    --accent: #c9533f;
    --bg: #faf8f3;
    --card: #ffffff;
    --ink: #2b2b28;
    --line: #e2ddd0;
    --admin-dark: #233b2c;
    --sun: #b83030;
  }

  *{ box-sizing: border-box; }

  body{
    margin: 0;
    font-family: "DM Sans", "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
  }

  /* ── Header（admin.htmlと統一） ── */
  header{
    background: var(--admin-dark);
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .header-left h1{
    margin: 0;
    font-size: 1.25rem;
    letter-spacing: 0.05em;
  }
  .header-left p{ margin: 3px 0 0; font-size: 0.78rem; opacity: 0.72; }
  .header-nav{ margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
  .header-nav a{
    display: inline-block;
    background: rgba(255,255,255,0.12);
    color: #fff;
    text-decoration: none;
    font-size: 0.78rem;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.28);
    transition: background 0.15s;
  }
  .header-nav a:hover{ background: rgba(255,255,255,0.22); }
  .header-logo{
    height: 100px;
    width: auto;
    object-fit: contain;
    flex-shrink: 0;
  }

  /* ── Month nav ── */
  .month-nav{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 12px 20px;
    background: var(--main-light);
    border-bottom: 2px solid var(--line);
  }
  .month-nav button{
    background: var(--main);
    color: #fff;
    border: none;
    border-radius: 100px;
    padding: 6px 18px;
    font-size: 0.8rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }
  .month-nav button:hover{ background: var(--main-dark); }
  .month-title{
    font-family: "DM Sans", "Hiragino Sans", sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--main-dark);
    min-width: 120px;
    text-align: center;
    letter-spacing: 0.06em;
  }

  /* ── Main wrapper ── */
  .main-wrap{
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px 14px 60px;
  }

  /* ── Calendar card（sectionと統一） ── */
  .cal-card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* ── Table ── */
  .cal{
    width: 100%;
    min-width: 380px;
    border-collapse: separate;
    border-spacing: 4px;
    table-layout: fixed;
  }

  /* 曜日ヘッダー */
  .cal thead th{
    background: var(--main);
    color: #fff;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 7px 4px;
    text-align: center;
    letter-spacing: 0.06em;
    border-radius: 8px;
  }
  .cal thead th.col-sun{ background: #8b2222; }

  /* td（セル外枠）*/
  .cal tbody td{
    vertical-align: top;
    background: transparent;
    padding: 0;
    width: calc(100% / 6);
  }

  /* セル本体 */
  .cell{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px 7px 7px;
    min-height: 82px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }

  /* 今日 */
  td.is-today .cell{
    background: var(--main-light);
    border: 2px solid var(--main);
    box-shadow: 0 0 0 3px rgba(74,124,89,0.12);
  }

  /* 過去日 */
  td.is-past .cell{
    background: #f5f4f0;
    border-color: #e6e2d8;
    box-shadow: none;
  }

  /* 空きセル */
  td.empty-cell{ background: transparent; }

  /* ── 日付数字エリア ── */
  .cell-date{
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 5px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--line);
  }
  td.is-today .cell-date{ border-bottom-color: rgba(74,124,89,0.25); }

  .date-num{
    font-family: "DM Sans", sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }
  .cell-date.is-sun .date-num{ color: var(--sun); }
  td.is-today .cell-date .date-num{ color: var(--main-dark); }

  .today-badge{
    font-size: 0.52rem;
    font-weight: 700;
    background: var(--main);
    color: #fff;
    padding: 1px 6px;
    border-radius: 100px;
    letter-spacing: 0.04em;
    line-height: 1.5;
  }

  /* ── メンバーブロック ── */
  .member{ margin-bottom: 0; }

  /* 名前（左）＋合計数（右）を横並び */
  .member-header{
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 2px;
    line-height: 1.2;
    overflow: hidden;
  }
  .member-name{
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--main-dark);
    letter-spacing: 0.02em;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  td.is-past .member-name{ color: #7a9080; }

  .member-subtotal{
    font-family: "DM Sans", sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--main);
    line-height: 1;
    white-space: nowrap;
    flex-shrink: 0;
  }
  td.is-past .member-subtotal{ color: #8aab94; }

  /* 具材行（縦並び・インデント） */
  .filling-row{
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 2px;
    padding-left: 8px;
    line-height: 1.45;
  }
  .filling-name{
    font-size: 0.58rem;
    color: #727268;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  td.is-past .filling-name{ color: #9a9a90; }

  .filling-qty{
    font-family: "DM Sans", sans-serif;
    font-size: 0.58rem;
    font-weight: 500;
    color: #505048;
    flex-shrink: 0;
    white-space: nowrap;
  }
  td.is-past .filling-qty{ color: #9a9a90; }

  /* メンバー間の区切り線 */
  .member-sep{
    border: none;
    border-top: 1px solid var(--line);
    margin: 4px 0;
  }
  td.is-today .member-sep{ border-color: rgba(74,124,89,0.2); }

  /* ── TOTAL バー ── */
  .cell-total{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
    background: var(--main);
    color: #fff;
    border-radius: 7px;
    padding: 4px 8px;
    font-family: "DM Sans", sans-serif;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .total-label{
    font-size: 0.62rem;
    opacity: 0.9;
  }
  .total-num{
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1;
  }
  td.is-past .cell-total{ background: #9aab9f; }

  /* ── 未確定 ── */
  .no-plan{
    font-size: 0.58rem;
    color: #ccc;
    text-align: center;
    margin-top: 10px;
    letter-spacing: 0.04em;
  }

  /* ── ローディング / エラー ── */
  .msg{ color: #999; font-size: 0.88rem; text-align: center; padding: 32px 16px; }

  /* ── フッター ── */
  footer{
    text-align: center;
    font-size: 0.75rem;
    color: #aaa;
    padding: 20px;
    border-top: 1px solid var(--line);
    letter-spacing: 0.05em;
    font-family: "DM Sans", sans-serif;
  }

  /* ── タップ可能セル（スマホのみ有効） ── */
  .cell.has-plan{ transition: box-shadow 0.12s, border-color 0.12s; }
  .tap-hint{ display: none; }

  /* ── 詳細モーダル ── */
  .modal-overlay{
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.52);
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 1000;
  }
  .modal-overlay.show{ display: flex; }
  .modal-box{
    background: #fff;
    border-radius: 18px;
    width: 100%;
    max-width: 380px;
    max-height: 82vh;
    overflow-y: auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.26);
  }
  .modal-date-head{
    background: var(--main);
    color: #fff;
    font-family: "DM Sans", sans-serif;
    font-weight: 700;
    font-size: 1rem;
    padding: 14px 18px;
    border-radius: 18px 18px 0 0;
    letter-spacing: 0.04em;
  }
  .modal-body{ padding: 14px 18px; }
  .modal-member-row{
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
  }
  .modal-member-name{
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--main-dark);
  }
  .modal-member-total{
    font-family: "DM Sans", sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--main);
  }
  .modal-filling-row{
    display: flex;
    justify-content: space-between;
    padding: 0 0 2px 14px;
    font-size: 0.8rem;
    color: #666;
  }
  .modal-sep{
    border: none;
    border-top: 1px solid var(--line);
    margin: 10px 0;
  }
  .modal-total-bar{
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--main);
    color: #fff;
    border-radius: 8px;
    padding: 8px 12px;
    margin-top: 14px;
    font-weight: 700;
    font-family: "DM Sans", sans-serif;
  }
  .modal-total-bar .tl{ font-size: 0.75rem; opacity: 0.88; }
  .modal-total-bar .tn{ font-size: 1.1rem; }
  .modal-close-wrap{
    padding: 12px 18px 16px;
    border-top: 1px solid var(--line);
  }
  .modal-close-btn{
    width: 100%;
    background: var(--main-light);
    color: var(--main-dark);
    border: none;
    border-radius: 100px;
    padding: 12px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.03em;
  }
  .modal-close-btn:active{ background: var(--line); }

  /* ── スマホ：コンパクト表示（768px以下） ── */
  @media (max-width: 768px){
    header{ padding: 12px 14px; }
    .header-left h1{ font-size: 1.05rem; }
    .header-logo{ height: 80px; }
    .cal-card{ padding: 6px 3px; }
    .cal{ min-width: 0; border-spacing: 2px; }
    .cal thead th{ font-size: 0.65rem; padding: 4px 1px; border-radius: 4px; }
    /* セル：コンパクト化 */
    .cell{ padding: 4px 3px 3px; min-height: 48px; border-radius: 6px; }
    .cell-date{ margin-bottom: 3px; padding-bottom: 3px; gap: 2px; }
    .date-num{ font-size: 0.75rem; }
    .today-badge{ font-size: 0.42rem; padding: 1px 3px; }
    /* メンバー：コンパクト */
    .member{ margin-bottom: 0; }
    .member-header{ line-height: 1.2; gap: 2px; }
    .member-name{ font-size: 0.72rem; letter-spacing: 0; line-height: 1.2; }
    .member-subtotal{ font-size: 0.78rem; line-height: 1.2; }
    /* 具材行・区切り・個：スマホでは非表示 */
    .filling-row{ display: none; }
    .member-sep{ display: none; }
    .unit{ display: none; }
    /* TOTAL バー：コンパクト */
    .cell-total{ padding: 2px 5px; border-radius: 4px; margin-top: 3px; }
    .total-label{ font-size: 0.5rem; }
    .total-num{ font-size: 0.78rem; }
    /* タップヒント：スマホのみ表示 */
    .tap-hint{ display: block; font-size: 0.4rem; color: #ccc; text-align: right; margin-top: 2px; }
    /* タップ操作フィードバック */
    .cell.has-plan{ cursor: pointer; }
    .cell.has-plan:active{ opacity: 0.8; }
    /* その他 */
    .month-title{ font-size: 0.95rem; min-width: 100px; }
    .month-nav button{ padding: 5px 13px; font-size: 0.75rem; }
    .no-plan{ font-size: 0.5rem; margin-top: 6px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>🍙 おにぎり生産カレンダー</h1>
    <nav class="header-nav">
      <a href="index.html">← トップへ</a>
      <a href="shift.html">シフト入力</a>
    </nav>
  </div>
  <img src="chabon-logo.png" alt="CHABON STAND" class="header-logo">
</header>

<div class="month-nav">
  <button id="prevBtn">◀ 前月</button>
  <div class="month-title" id="monthTitle"></div>
  <button id="nextBtn">翌月 ▶</button>
</div>

<div class="main-wrap">
  <div class="cal-card">
    <div id="calArea"><p class="msg">読み込み中…</p></div>
  </div>
</div>

<div class="modal-overlay" id="detailModal">
  <div class="modal-box">
    <div class="modal-date-head" id="modalDateHead"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-close-wrap">
      <button class="modal-close-btn" id="modalCloseBtn">閉じる</button>
    </div>
  </div>
</div>

<footer>Chabon Ops — Amsterdam Onigiri Truck</footer>

<script>
const SPREADSHEET_ID = "1PHf1o3smqIQdeFkhBHjBZUEub7VtRcynQLllmSR7w-s";
const COL_LABELS = ["日","月","火","水","木","金"];

let dispYear, dispMonth;
let allPlans = {};

/* ── Data fetch & parse ── */
async function fetchSheetJson(sheetName){
  const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  const text = await res.text();
  const m = text.match(/setResponse\(([\s\S]*)\);\s*$/);
  if(!m) throw new Error("シート解析失敗: " + sheetName);
  return JSON.parse(m[1]);
}

function parseFillings(str){
  if(!str) return [];
  return str.trim().split(/\s+/).filter(Boolean).map(part => {
    const [filling, qtyStr] = part.split("×");
    return { filling: filling || "", qty: parseInt(qtyStr, 10) || 0 };
  });
}

function parseMembers(str){
  if(!str) return [];
  return str.split("；").filter(Boolean).map(part => {
    const idx = part.indexOf(":");
    const name = idx === -1 ? part.trim() : part.slice(0, idx).trim();
    const items = parseFillings(idx === -1 ? "" : part.slice(idx + 1));
    const total = items.reduce((s, it) => s + it.qty, 0);
    return { name, items, total };
  });
}

function inferDate(mdStr){
  const [m, d] = mdStr.split("/").map(Number);
  if(!m || !d) return null;
  const today = new Date();
  let yr = today.getFullYear();
  let cand = new Date(yr, m - 1, d);
  const diff = (cand - today) / 86400000;
  if(diff < -180) cand = new Date(yr + 1, m - 1, d);
  else if(diff > 180) cand = new Date(yr - 1, m - 1, d);
  return cand;
}

async function loadData(){
  const json = await fetchSheetJson("確定プラン");
  const rows = json.table.rows || [];
  const byLabel = new Map();

  rows.filter(r => r.c && r.c[0]).forEach(r => {
    const c = r.c;
    const dateLabel = String(c[0]?.f || c[0]?.v || "").trim();
    if(!dateLabel) return;
    const zuidQty  = Number(c[2]?.v) || 0;
    const uvaQty   = Number(c[3]?.v) || 0;
    const chiseQty = Number(c[4]?.v) || 0;
    const members  = parseMembers(c[5]?.v);
    const total    = zuidQty + uvaQty + chiseQty;
    const sortDate = inferDate(dateLabel);
    byLabel.set(dateLabel, { dateLabel, members, total, sortDate });
  });

  allPlans = {};
  byLabel.forEach(plan => {
    if(!plan.sortDate) return;
    const yr = plan.sortDate.getFullYear();
    const mo = plan.sortDate.getMonth() + 1;
    const dy = plan.sortDate.getDate();
    allPlans[`${yr}-${mo}-${dy}`] = plan;
  });
}

/* ── Calendar render ── */
function buildWeeks(yr, mo){
  const lastDay = new Date(yr, mo + 1, 0).getDate();
  const weeks = [];
  let week = new Array(6).fill(null);

  for(let d = 1; d <= lastDay; d++){
    const dow = new Date(yr, mo, d).getDay();
    if(dow === 6) continue;
    week[dow] = d;
    if(dow === 5){
      weeks.push(week);
      week = new Array(6).fill(null);
    }
  }
  if(week.some(v => v !== null)) weeks.push(week);
  return weeks;
}

// カレンダーセル内表示（PC：名前＋具材＋合計 / スマホ：名前＋合計のみ）
function memberBlockHtml(m){
  let html = `<div class="member">
    <div class="member-header">
      <span class="member-name">${m.name}</span>
      <span class="member-subtotal">${m.total}<span class="unit">個</span></span>
    </div>`;
  m.items.forEach(it => {
    html += `<div class="filling-row">
      <span class="filling-name">・${it.filling}</span>
      <span class="filling-qty">×${it.qty}</span>
    </div>`;
  });
  html += `</div>`;
  return html;
}

// モーダル内の詳細表示（名前＋合計＋具材内訳）
function memberModalHtml(m){
  let html = `<div class="modal-member-row">
    <span class="modal-member-name">${m.name}</span>
    <span class="modal-member-total">${m.total}個</span>
  </div>`;
  m.items.forEach(it => {
    html += `<div class="modal-filling-row">
      <span>${it.filling}</span>
      <span>×${it.qty}</span>
    </div>`;
  });
  return html;
}

function renderCalendar(){
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const yr = dispYear;
  const mo = dispMonth;
  document.getElementById("monthTitle").textContent = `${yr}年${mo + 1}月`;

  const weeks = buildWeeks(yr, mo);

  let html = `<table class="cal"><thead><tr>`;
  COL_LABELS.forEach((lbl, i) => {
    html += `<th class="${i === 0 ? "col-sun" : ""}">${lbl}</th>`;
  });
  html += `</tr></thead><tbody>`;

  for(const wk of weeks){
    html += `<tr>`;
    for(let ci = 0; ci < 6; ci++){
      const day = wk[ci];
      if(day === null){
        html += `<td class="empty-cell"></td>`;
        continue;
      }
      const dateObj = new Date(yr, mo, day);
      const isToday = dateObj.getTime() === today.getTime();
      const isPast  = dateObj < today;
      const isSun   = ci === 0;
      const key     = `${yr}-${mo + 1}-${day}`;
      const plan    = allPlans[key];

      let tdCls = "";
      if(isToday) tdCls = "is-today";
      else if(isPast) tdCls = "is-past";

      const activeMembers = plan ? plan.members.filter(m => m.total > 0) : [];
      const hasPlan = activeMembers.length > 0 || !!plan;
      html += `<td${tdCls ? ` class="${tdCls}"` : ""}>`;
      html += `<div class="cell${hasPlan ? ' has-plan' : ''}"${hasPlan ? ` data-day-key="${key}"` : ""}>`;

      // 日付ヘッダー
      html += `<div class="cell-date${isSun ? " is-sun" : ""}">`;
      html += `<span class="date-num">${day}</span>`;
      if(isToday) html += `<span class="today-badge">TODAY</span>`;
      html += `</div>`;

      if(activeMembers.length > 0){
        activeMembers.forEach(m => {
          html += memberBlockHtml(m);
        });
        const dispTotal = activeMembers.reduce((s, m) => s + m.total, 0);
        html += `<div class="cell-total">`;
        html += `<span class="total-label">TOTAL</span>`;
        html += `<span class="total-num">${dispTotal}<span class="unit">個</span></span>`;
        html += `</div>`;
        html += `<div class="tap-hint">詳細 ›</div>`;
      } else if(plan){
        html += `<div class="cell-total">`;
        html += `<span class="total-label">TOTAL</span>`;
        html += `<span class="total-num">0<span class="unit">個</span></span>`;
        html += `</div>`;
      } else if(!isPast){
        html += `<div class="no-plan">未確定</div>`;
      }

      html += `</div></td>`;
    }
    html += `</tr>`;
  }

  html += `</tbody></table>`;
  document.getElementById("calArea").innerHTML = html;

  document.querySelectorAll(".cell.has-plan").forEach(cell => {
    cell.addEventListener("click", () => openModal(cell.dataset.dayKey));
  });
}

/* ── Modal ── */
function openModal(key){
  const plan = allPlans[key];
  if(!plan) return;
  const [yr, mo, dy] = key.split("-").map(Number);
  const dowNames = ["日","月","火","水","木","金","土"];
  const dow = new Date(yr, mo - 1, dy).getDay();
  document.getElementById("modalDateHead").textContent = `${mo}月${dy}日（${dowNames[dow]}）`;

  const activeMembers = plan.members.filter(m => m.total > 0);
  let bodyHtml = "";
  if(activeMembers.length > 0){
    activeMembers.forEach((m, i) => {
      if(i > 0) bodyHtml += `<hr class="modal-sep">`;
      bodyHtml += memberModalHtml(m);
    });
    const total = activeMembers.reduce((s, m) => s + m.total, 0);
    bodyHtml += `<div class="modal-total-bar"><span class="tl">TOTAL</span><span class="tn">${total}個</span></div>`;
  } else {
    bodyHtml = `<p style="color:#999;text-align:center;margin:12px 0;">この日の割り振りはありません</p>`;
  }
  document.getElementById("modalBody").innerHTML = bodyHtml;
  document.getElementById("detailModal").classList.add("show");
  document.body.style.overflow = "hidden";
}

function closeModal(){
  document.getElementById("detailModal").classList.remove("show");
  document.body.style.overflow = "";
}

/* ── Init ── */
async function init(){
  const now = new Date();
  dispYear  = now.getFullYear();
  dispMonth = now.getMonth();

  document.getElementById("prevBtn").addEventListener("click", () => {
    dispMonth--;
    if(dispMonth < 0){ dispMonth = 11; dispYear--; }
    renderCalendar();
  });
  document.getElementById("nextBtn").addEventListener("click", () => {
    dispMonth++;
    if(dispMonth > 11){ dispMonth = 0; dispYear++; }
    renderCalendar();
  });

  document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
  document.getElementById("detailModal").addEventListener("click", e => {
    if(e.target === document.getElementById("detailModal")) closeModal();
  });

  try{
    await loadData();
  }catch(e){
    console.error("[production.html] データ取得失敗", e);
    document.getElementById("calArea").innerHTML = '<p class="msg">データの取得に失敗しました。</p>';
    return;
  }
  renderCalendar();
}

init();
</script>
</body>
</html>
